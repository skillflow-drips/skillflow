name: SkillFlow CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm check:frontend

      - name: Build frontend
        run: pnpm build:frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Build backend
        run: pnpm check:backend

  contracts:
    name: Soroban Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo format
        run: cargo fmt --manifest-path contracts/Cargo.toml -- --check

      - name: Cargo check
        run: cargo check --manifest-path contracts/Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path contracts/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path contracts/Cargo.toml

      - name: Cargo build
        run: cargo build --manifest-path contracts/Cargo.toml
